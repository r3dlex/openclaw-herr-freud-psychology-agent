name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests and coverage
        run: |
          output=$(MIX_ENV=test mix coveralls 2>&1)
          echo "$output"
          total=$(echo "$output" | grep '\[TOTAL\]' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ "$total" -lt 48 ]; then echo "FAIL: coverage ${total}% < 48%"; exit 1; fi

      - name: Credo
        run: mix credo --strict

      - name: Dialyzer
        run: bash scripts/dialyzer-filter.sh

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover/